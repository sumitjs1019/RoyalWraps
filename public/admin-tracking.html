<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>RoyalWrap Tracking Admin</title><link rel="stylesheet" href="admin-orders.css"><script src="admin-tracking.js" defer></script></head><body><main class="admin-shell"><header class="admin-header"><div><p class="eyebrow">RoyalWrap Admin</p><h1>Customer Tracking</h1><p class="subtitle">Create customer login and add WrapCart/Amazon tracking details.</p></div><a class="store-link" href="/admin-orders.html">Orders Dashboard</a></header><section class="login-card" id="loginCard"><h2>Admin access</h2><form id="loginForm"><input id="adminKey" type="password" minlength="8" placeholder="Admin key" required><button type="submit">Open Tracking Admin</button></form><p class="message" id="loginMessage"></p></section><section class="dashboard hidden" id="dashboard"><div class="toolbar"><input id="searchInput" type="search" placeholder="Search customer, mobile, order..."><button id="refreshBtn" type="button">Refresh</button><button id="logoutBtn" class="secondary" type="button">Lock</button></div><section class="login-card" style="max-width:none;margin:0 0 20px"><h2>Add / update customer tracking</h2><form id="trackingForm" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px"><input name="name" placeholder="Customer name" required><input name="mobile" placeholder="10-digit mobile" maxlength="10" required><input name="password" type="password" minlength="8" placeholder="New/login password (8+ chars)"><input name="orderReference" placeholder="RoyalWrap / WrapCart order ID" required><input name="productSummary" placeholder="Product and mobile model" required><input name="amount" type="number" min="0" placeholder="Amount"><select name="status"><option>Order Confirmed</option><option>Processing</option><option>Printed</option><option>Shipped</option><option>Out for Delivery</option><option>Delivered</option><option>Cancelled</option></select><input name="carrier" value="Amazon Shipping" placeholder="Carrier"><input name="trackingNumber" placeholder="Tracking number"><input name="trackingUrl" type="url" placeholder="https:// tracking link"><button type="submit">Save Customer Order</button></form><p class="message" id="formMessage"></p></section><div class="orders-grid" id="customersGrid"></div><div class="empty-state hidden" id="emptyState">No customers found.</div></section></main></body></html>
