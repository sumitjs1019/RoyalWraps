<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0a08">
  <title>My Orders | RoyalWrap</title>
  <meta name="description" content="View and manage all RoyalWrap orders linked to your verified mobile number.">
  <link rel="stylesheet" href="customer-orders.css">
  <script src="customer-orders.js" defer></script>
</head>
<body data-order-mode="list">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="RoyalWrap home">
        <img src="assets/royalwraps-logo-icon.png" alt="">
        <span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span>
      </a>
      <a class="continue-link" href="/" aria-label="Continue shopping">Continue Shopping <span aria-hidden="true">→</span></a>
    </div>
  </header>

  <main class="shell">
    <section class="account-heading" aria-labelledby="pageTitle">
      <div>
        <div class="eyebrow">Customer Account</div>
        <h1 id="pageTitle">Your Orders</h1>
        <p>Check payment, production and delivery updates for every RoyalWrap order.</p>
      </div>
      <nav class="order-tabs" aria-label="Order pages">
        <a class="active" href="my-orders.html" aria-current="page">My Orders</a>
        <a href="track-order.html">Track Order</a>
      </nav>
    </section>

    <section class="account-bar" aria-label="Signed-in account">
      <div class="account-identity">
        <span class="account-icon" aria-hidden="true">✓</span>
        <div><span class="account-label">Signed in with verified mobile</span><strong id="accountMobile">Checking login...</strong></div>
      </div>
      <button class="text-button" id="logoutBtn" type="button">Logout</button>
    </section>

    <section class="orders-toolbar" aria-label="Order filters">
      <div>
        <h2>Order history</h2>
        <p id="orderCountText">Loading your orders…</p>
      </div>
      <div class="toolbar-controls">
        <label class="search-control">
          <span class="sr-only">Search orders</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"/></svg>
          <input id="orderSearch" type="search" placeholder="Search order or product" autocomplete="off">
        </label>
        <label class="select-control">
          <span class="sr-only">Filter orders</span>
          <select id="orderFilter">
            <option value="all">All orders</option>
            <option value="active">Active orders</option>
            <option value="delivered">Delivered</option>
            <option value="payment-failed">Payment failed</option>
          </select>
        </label>
      </div>
    </section>

    <div class="message" id="orderMessage" role="status" aria-live="polite"></div>
    <section class="orders" id="orderResults" aria-label="Your orders"></section>
  </main>
</body>
</html>
