<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | RoyalWrap</title>
  <meta name="description" content="View all RoyalWrap orders linked to your logged-in mobile number.">
  <link rel="stylesheet" href="customer-orders.css">
  <script src="customer-orders.js" defer></script>
</head>
<body data-order-mode="list">
  <div class="shell">
    <div class="topbar">
      <a class="brand" href="/"><img src="assets/royalwraps-logo-icon.png" alt="RoyalWrap logo"><span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span></a>
      <a class="back" href="/">← Continue Shopping</a>
    </div>

    <section class="hero">
      <div class="eyebrow">Customer Account</div>
      <h1>My Orders</h1>
      <p>All orders linked to your verified login mobile number appear automatically here.</p>
      <div class="page-links"><a href="track-order.html">Track Orders</a></div>
    </section>

    <section class="account-bar">
      <div><span class="account-label">Logged in as</span><strong id="accountMobile">Checking login...</strong></div>
      <button class="secondary-action compact" id="logoutBtn" type="button">Logout</button>
    </section>

    <div class="message" id="orderMessage"></div>
    <div class="orders" id="orderResults"></div>
  </div>
</body>
</html>
