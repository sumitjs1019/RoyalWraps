<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | RoyalWrap</title>
  <meta name="description" content="View your RoyalWrap order history securely using mobile OTP verification.">
  <link rel="stylesheet" href="customer-orders.css">
  <script src="customer-orders.js" defer></script>
</head>
<body data-order-mode="list">
  <div class="shell">
    <div class="topbar">
      <a class="brand" href="/"><img src="assets/royalwraps-logo-icon.png" alt="RoyalWrap logo"><span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span></a>
      <a class="back" href="/">← Continue Shopping</a>
    </div>

    <section class="hero">
      <div class="eyebrow">Customer Order Centre</div>
      <h1>My Orders</h1>
      <p>Enter the same mobile number used during checkout. Verify the OTP to view all orders linked to that number.</p>
    </section>

    <section class="card">
      <form id="customerOrderForm" class="form-grid">
        <label class="full">Mobile number<input id="mobileInput" type="tel" name="mobile" required maxlength="10" inputmode="numeric" pattern="[6-9][0-9]{9}" placeholder="10-digit Indian mobile number" autocomplete="tel"></label>
        <div class="full"><button class="primary" id="sendOtpBtn" type="button">Send OTP</button><p class="note">OTP will be sent only when this mobile number has a RoyalWrap order.</p></div>
        <div class="otp-stage hidden" id="otpStage">
          <label class="full">Enter OTP<input id="otpInput" type="tel" name="otp" maxlength="10" inputmode="numeric" placeholder="Enter OTP" autocomplete="one-time-code"></label>
          <div><button class="primary" id="verifyOtpBtn" type="submit">Verify OTP & Show My Orders</button></div>
          <div><button class="secondary-action" id="resendOtpBtn" type="button" disabled>Resend OTP</button></div>
        </div>
      </form>
      <div class="message" id="orderMessage"></div>
    </section>

    <div class="orders" id="orderResults"></div>
  </div>
</body>
</html>
