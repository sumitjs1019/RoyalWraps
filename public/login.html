<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Login</title>
  <meta name="description" content="Log in to RoyalWrap with your checkout mobile number and OTP.">
  <link rel="stylesheet" href="customer-orders.css">
  <script src="customer-login.js" defer></script>
</head>
<body>
  <div class="shell login-shell">
    <div class="topbar">
      <a class="brand" href="/"><img src="assets/royalwraps-logo-icon.png" alt="RoyalWrap logo"><span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span></a>
      <a class="back" href="/">← Continue Shopping</a>
    </div>
    <section class="card login-card">
      <form id="loginForm" class="form-grid">
        <h1>Login with Mobile OTP</h1>
        <label class="full">Mobile Number<input id="mobileInput" type="tel" name="mobile" required maxlength="10" inputmode="numeric" pattern="[6-9][0-9]{9}" placeholder="Enter 10-digit mobile number" autocomplete="tel"></label>
        <div class="full"><button class="primary" id="sendOtpBtn" type="button">Send OTP</button><p class="note">use the same mobile number when you order products</p></div>
        <div class="otp-stage hidden" id="otpStage">
          <label class="full">Enter OTP<input id="otpInput" type="tel" name="otp" maxlength="10" inputmode="numeric" placeholder="Enter OTP" autocomplete="one-time-code"></label>
          <div><button class="primary" id="verifyOtpBtn" type="submit">Verify OTP & Login</button></div>
          <div><button class="secondary-action" id="resendOtpBtn" type="button" disabled>Resend OTP</button></div>
        </div>
      </form>
      <div class="message" id="loginMessage"></div>
    </section>
  </div>
</body>
</html>
