<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0a08">
  <title>Track Order | RoyalWrap</title>
  <meta name="description" content="Track RoyalWrap shipments linked to your verified mobile number.">
  <link rel="stylesheet" href="customer-orders.css?v=20260715-2">
  <link rel="stylesheet" href="order-ui-cleanup.css?v=20260715-2">
  <link rel="stylesheet" href="mobile-header-fixes.css?v=20260715-2">
  <script src="order-model-cleanup.js?v=20260715-2" defer></script>
  <script src="customer-orders.js?v=20260715-2" defer></script>
</head>
<body data-order-mode="track">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="RoyalWrap home">
        <img src="assets/royalwraps-logo-icon.png" alt="">
        <span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span>
      </a>
      <a class="continue-link" href="/" aria-label="Continue shopping">Continue Shopping <span aria-hidden="true">→</span></a>
    </div>
  </header>

  <main class="shell">
    <section class="account-heading account-heading--tabs-only">
      <nav class="order-tabs" aria-label="Order pages">
        <a href="my-orders.html">My Orders</a>
        <a class="active" href="track-order.html" aria-current="page">Track Order</a>
      </nav>
    </section>

    <section class="tracking-intro">
      <div class="tracking-intro-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M3 6h11v10H3zM14 9h4l3 3v4h-7zM7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm11 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
      </div>
      <div><h2>Live delivery updates</h2><p id="orderCountText">Loading orders…</p></div>
    </section>

    <div class="message" id="orderMessage" role="status" aria-live="polite"></div>
    <section class="orders" id="orderResults" aria-label="Shipment tracking"></section>
  </main>

  <div style="display:none!important" aria-hidden="true">
    <span id="accountMobile"></span>
    <button id="logoutBtn" type="button" tabindex="-1"></button>
  </div>
</body>
</html>
