<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | RoyalWrap</title>
  <meta name="description" content="Track all RoyalWrap shipments linked to your logged-in mobile number.">
  <link rel="stylesheet" href="customer-orders.css">
  <script src="customer-orders.js" defer></script>
</head>
<body data-order-mode="track">
  <div class="shell">
    <div class="topbar">
      <a class="brand" href="/"><img src="assets/royalwraps-logo-icon.png" alt="RoyalWrap logo"><span><strong>RoyalWrap</strong><small>Premium Mobile Skins</small></span></a>
      <a class="back" href="/">← Continue Shopping</a>
    </div>

    <section class="hero">
      <div class="eyebrow">Shipment Tracking</div>
      <h1>Track Orders</h1>
      <p>All shipments linked to your verified login mobile number appear automatically. Live courier updates become available after an AWB is generated.</p>
      <div class="page-links"><a href="my-orders.html">View My Orders</a></div>
    </section>

    <section class="account-bar">
      <div><span class="account-label">Logged in as</span><strong id="accountMobile">Checking login...</strong></div>
      <div class="account-actions"><button class="secondary-action compact" id="refreshOrdersBtn" type="button">Refresh Tracking</button><button class="secondary-action compact" id="logoutBtn" type="button">Logout</button></div>
    </section>

    <div class="message" id="orderMessage"></div>
    <div class="orders" id="orderResults"></div>
  </div>
</body>
</html>
