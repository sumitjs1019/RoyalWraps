<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Payment Successful | RoyalWrap</title>
  <style>
    body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;color:#f7f1e4;background:#0b0906;font-family:Arial,sans-serif;text-align:center}
    .card{max-width:520px;padding:32px;border:1px solid #59451f;border-radius:22px;background:#12100c}
    h1{margin:0 0 10px;color:#f5c65b}p{margin:0;color:#b5ad9f;line-height:1.6}a{display:inline-block;margin-top:22px;color:#171108;background:#f5c65b;padding:13px 20px;border-radius:12px;font-weight:700;text-decoration:none}
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.location.replace('/track-order.html?payment=success');
    });
  </script>
</head>
<body>
  <main class="card">
    <h1>Payment successful</h1>
    <p>Signing you in and opening your order tracking…</p>
    <a href="/track-order.html?payment=success">Open Track Order</a>
  </main>
</body>
</html>
